server {
    listen 80;
    server_name _;

    # -------------------------------------------------------------------------
    # Security headers
    # NOTE: This nginx serves HTTP only — TLS is terminated at CloudFront/ALB.
    # CloudFront forwards these response headers to the browser unchanged, so
    # setting them here is correct. Verify the CloudFront distribution has no
    # response-header policy that strips custom headers.
    # -------------------------------------------------------------------------

    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Disallow rendering in <iframe> / <frame> / <object> (clickjacking)
    add_header X-Frame-Options "DENY" always;

    # Limit referrer information sent on cross-origin navigation
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Disable browser features not used by this app
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Enforce HTTPS for 1 year (browser enforces after first visit via CloudFront)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Content Security Policy
    #
    # connect-src:
    #   'self'                       — /api/* REST and /api/ws WebSocket, both proxied
    #                                  through nginx so they share the page origin
    #   https://accounts.google.com  — Google Identity Services token exchange
    #
    # Finnhub and Alpha Vantage are called server-side only; excluded intentionally.
    # wss: wildcard excluded — 'self' is sufficient and significantly tighter.
    # style-src 'unsafe-inline' required by MUI/emotion CSS-in-JS; remove in Phase 2
    # when migrating to Vite with nonce-based CSP.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://accounts.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; connect-src 'self' https://accounts.google.com; frame-src https://accounts.google.com; font-src 'self'" always;

    root /usr/share/nginx/html;
    index index.html;

    # HTTP security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://accounts.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; connect-src 'self' wss: https://finnhub.io https://www.alphavantage.co https://accounts.google.com; frame-src https://accounts.google.com; font-src 'self'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://localhost:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
