name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-backend:
    name: Lint — Backend (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff mypy
      - run: ruff check backend/app
      - run: cd backend && mypy app/ --ignore-missing-imports

  lint-frontend:
    name: Lint — Frontend (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci --legacy-peer-deps
      - run: cd frontend && npx tsc --noEmit

  test-backend:
    name: Test — Backend (pytest)
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest-cov pytest-timeout

      - name: Run tests
        run: |
          cd backend && pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            --junitxml=junit.xml \
            -q

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Backend Tests
          path: backend/junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

      - uses: codecov/codecov-action@v4
        if: always()
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false

  test-frontend:
    name: Test — Frontend (jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci --legacy-peer-deps
      - run: cd frontend && npm test -- --coverage --watchAll=false
        env:
          CI: true

  build:
    name: Build — Docker images
    needs: [lint-backend, lint-frontend, test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        run: docker build -t finmonitor-backend:${{ github.sha }} ./backend
      - name: Build frontend image
        run: |
          docker build \
            -t finmonitor-frontend:${{ github.sha }} \
            --build-arg NGINX_CONF=nginx.prod.conf \
            ./frontend
