# Google Cloud Run service definition
# Deploy with: gcloud run services replace cloud-run.yaml --region=us-central1
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: finmonitor-backend
  labels:
    cloud.googleapis.com/location: us-central1
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
        run.googleapis.com/cloudsql-instances: "${PROJECT_ID}:us-central1:finmonitor-db"
    spec:
      containers:
        - image: gcr.io/${PROJECT_ID}/finmonitor-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: APP_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-url
                  key: latest
            - name: FINNHUB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: finnhub-api-key
                  key: latest
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
